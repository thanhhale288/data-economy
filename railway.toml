[build]
# Prefer Dockerfile when Railway respects this setting.
# If the service UI is set to Railpack, startCommand below / railpack.json apply.
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
